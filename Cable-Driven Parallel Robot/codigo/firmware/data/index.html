<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDPR - Panel de Control</title>
    <!-- Importar tipografía moderna -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Cargar Three.js y OrbitControls para la visualización 3D -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Encabezado Principal -->
        <header class="main-header">
            <div class="logo-container">
                <h1>CDPR <span>6-DOF</span></h1>
                <p>Robot Paralelo Accionado por Cables</p>
            </div>
            <div class="status-panel">
                <div class="status-indicator">
                    <span id="connection-dot" class="dot disconnected"></span>
                    <span id="connection-status">Desconectado</span>
                </div>
                <div class="status-indicator">
                    <span id="robot-dot" class="dot unhomed"></span>
                    <span id="robot-state">Homing Pendiente</span>
                </div>
            </div>
        </header>

        <!-- Layout de Paneles -->
        <main class="dashboard-grid">
            
            <!-- Panel Izquierdo: Controles -->
            <section class="control-panel glass-panel">
                <h2>Controles de Pose</h2>
                
                <!-- Traslación -->
                <div class="control-group">
                    <h3>Posición (cm)</h3>
                    <div class="slider-wrapper">
                        <label for="slider-x">X</label>
                        <input type="range" id="slider-x" min="-10" max="10" step="0.1" value="0" disabled>
                        <span id="val-x">0.0</span>
                    </div>
                    <div class="slider-wrapper">
                        <label for="slider-y">Y</label>
                        <input type="range" id="slider-y" min="-10" max="10" step="0.1" value="0" disabled>
                        <span id="val-y">0.0</span>
                    </div>
                    <div class="slider-wrapper">
                        <label for="slider-z">Z</label>
                        <input type="range" id="slider-z" min="10" max="35" step="0.1" value="22.5" disabled>
                        <span id="val-z">22.5</span>
                    </div>
                </div>

                <!-- Rotación -->
                <div class="control-group">
                    <h3>Rotación (grados)</h3>
                    <div class="slider-wrapper">
                        <label for="slider-r">Roll (X)</label>
                        <input type="range" id="slider-r" min="-30" max="30" step="1" value="0" disabled>
                        <span id="val-r">0°</span>
                    </div>
                    <div class="slider-wrapper">
                        <label for="slider-p">Pitch (Y)</label>
                        <input type="range" id="slider-p" min="-30" max="30" step="1" value="0" disabled>
                        <span id="val-p">0°</span>
                    </div>
                    <div class="slider-wrapper">
                        <label for="slider-yaw">Yaw (Z)</label>
                        <input type="range" id="slider-yaw" min="-30" max="30" step="1" value="0" disabled>
                        <span id="val-yaw">0°</span>
                    </div>
                </div>

                <!-- Botones de Acción -->
                <div class="action-buttons">
                    <button id="btn-homing" class="btn btn-warning">Inicializar Homing</button>
                    <button id="btn-center" class="btn btn-primary" disabled>Ir a Centro</button>
                    <button id="btn-estop" class="btn btn-danger">PARO DE EMERGENCIA</button>
                </div>
            </section>

            <!-- Panel Central: Visualización 3D -->
            <section class="visualizer-panel glass-panel">
                <h2>Visualización 3D en Vivo</h2>
                <div id="canvas-container"></div>
            </section>

            <!-- Panel Derecho: Telemetría de Cables -->
            <section class="telemetry-panel glass-panel">
                <h2>Telemetría de Actuadores</h2>
                <div class="cables-grid">
                    <!-- Filas autogeneradas por JS o declaradas de soporte -->
                    <div class="cables-header">
                        <span>Cable</span>
                        <span>Long. Target</span>
                        <span>Long. Real</span>
                        <span>PWM / Carga</span>
                    </div>
                    <div id="cables-list">
                        <!-- Generado dinámicamente -->
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="main.js"></script>
</body>
</html>
